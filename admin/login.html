<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GeoTraverse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f74ba 0%, #0a5a8e 100%);
            min-height: 100vh;
        }
        .login-card { animation: fadeInUp 0.5s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .password-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; background: none; border: none; color: #9ca3af; }
        .password-toggle:hover { color: #0f74ba; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 12px 24px; border-radius: 8px; z-index: 1000; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="min-h-screen flex items-center justify-center px-4">
    <div class="login-card bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <div class="text-center mb-8">
            <img src="https://i.postimg.cc/MT6jTVHh/weblogo.png" alt="Logo" class="w-20 h-20 mx-auto rounded-xl shadow-lg">
            <h2 class="text-2xl font-bold text-gray-800 mt-3">Admin Login</h2>
            <p class="text-gray-500 text-sm">Sign in to your dashboard</p>
        </div>
        
        <!-- LOGIN FORM - NO PHP ACTION -->
        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="email" id="email" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg" placeholder="admin@geotraverse.com" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="password" id="password" class="w-full pl-10 pr-12 py-3 border border-gray-300 rounded-lg" required>
                    <button type="button" onclick="togglePassword()" class="password-toggle">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            
            <div class="text-right mb-6">
                <a href="#" onclick="showForgotPassword()" class="text-sm text-blue-600 hover:underline">Forgot Password?</a>
            </div>
            
            <button type="submit" id="loginBtn" class="w-full bg-gradient-to-r from-blue-600 to-blue-800 hover:from-blue-700 hover:to-blue-900 text-white py-3 rounded-lg font-semibold">
                <i class="fas fa-sign-in-alt mr-2"></i> Sign In
            </button>
        </form>
        
        <div id="errorMessage" class="mt-4 text-center hidden"></div>
        <div class="text-center mt-6 pt-4 border-t border-gray-100">
            <p class="text-xs text-gray-400">© 2024 GeoTraverse. All rights reserved.</p>
        </div>
    </div>
</div>

<script>
    // Toggle password visibility
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const icon = document.querySelector('.password-toggle i');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'} mr-2"></i> ${message}`;
        if (isError) toast.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function showForgotPassword() {
        const email = prompt('Enter your email address:');
        if (email && email === 'jacksonmyula773@gmail.com') {
            showToast('Password reset link sent to your email!');
        } else if (email) {
            showToast('Email not found!', true);
        }
    }
    
    // ============================================
    // LOGIN WITH FETCH API - HII NDIO TUNAYOHITAJI
    // ============================================
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const loginBtn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('errorMessage');
        
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Logging in...';
        
        try {
            // CALL BACKEND API - HUU NDIO MSTARI WA FETCH!
            const response = await fetch('http://localhost/geotraverse/backend/api/admin_login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            });
            
            const result = await response.json();
            
            if (result.success) {
                localStorage.setItem('admin_logged_in', 'true');
                localStorage.setItem('admin_email', email);
                showToast('Login successful!');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                errorDiv.innerHTML = `<div class="bg-red-100 text-red-700 p-3 rounded-lg">${result.message}</div>`;
                errorDiv.classList.remove('hidden');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> Sign In';
                setTimeout(() => errorDiv.classList.add('hidden'), 3000);
            }
        } catch (error) {
            errorDiv.innerHTML = `<div class="bg-red-100 text-red-700 p-3 rounded-lg">Connection error: ${error.message}</div>`;
            errorDiv.classList.remove('hidden');
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> Sign In';
        }
    });
</script>
</body>
</html>
