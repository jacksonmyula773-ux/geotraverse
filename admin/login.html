<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTraverse | Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f74ba 0%, #0a5a8e 100%);
            min-height: 100vh;
        }
        .login-card {
            animation: fadeInUp 0.6s ease-out;
            backdrop-filter: blur(10px);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-field:focus {
            transform: scale(1.01);
            box-shadow: 0 0 0 3px rgba(15,116,186,0.2);
            border-color: #0f74ba;
        }
        .login-btn {
            transition: all 0.3s ease;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px -5px rgba(0,0,0,0.2); }
        .login-btn.disabled { opacity: 0.7; cursor: not-allowed; }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
            font-size: 13px;
        }
        .toast-message.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .shake { animation: shake 0.3s ease-in-out; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .modal-enter { animation: modalPop 0.2s ease-out; }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .password-field { position: relative; }
        .password-field input { padding-right: 45px; }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9ca3af;
        }
        .password-toggle:hover { color: #0f74ba; }
        .reset-link-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
        }
        .reset-link-box p { font-size: 11px; color: #166534; word-break: break-all; }
        @media (max-width: 640px) {
            .login-card { margin: 16px; padding: 20px !important; }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

<div class="login-card bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl w-full max-w-sm p-6 border border-white/20">
    
    <div class="text-center mb-6">
        <img src="https://i.postimg.cc/MT6jTVHh/weblogo.png" alt="Logo" class="w-16 h-16 mx-auto">
        <h2 class="text-xl font-bold text-gray-800 mt-3">Admin Login</h2>
        <p class="text-gray-500 text-xs mt-1">Sign in to your admin dashboard</p>
    </div>
    
    <form id="loginForm">
        <div class="mb-4">
            <label class="block text-xs font-semibold text-gray-700 mb-1">Email Address</label>
            <input type="email" id="loginEmail" 
                   class="input-field w-full p-2.5 rounded-xl border border-gray-200 focus:border-blue-500 focus:outline-none text-sm"
                   placeholder="jacksonmyula773@gmail.com" 
                   value="jacksonmyula773@gmail.com"
                   required>
        </div>
        
        <div class="mb-3">
            <label class="block text-xs font-semibold text-gray-700 mb-1">Password</label>
            <div class="password-field relative">
                <input type="password" id="loginPassword" 
                       class="input-field w-full p-2.5 rounded-xl border border-gray-200 focus:border-blue-500 focus:outline-none text-sm pr-10"
                       placeholder="Enter your password" required>
                <i class="fas fa-eye password-toggle" onclick="togglePasswordVisibility()"></i>
            </div>
        </div>
        
        <div class="flex justify-between items-center mb-5">
            <label class="flex items-center cursor-pointer">
                <input type="checkbox" id="rememberMe" class="w-3.5 h-3.5 text-blue-600 rounded">
                <span class="ml-1.5 text-xs text-gray-600">Remember me</span>
            </label>
            <button type="button" id="forgotPasswordBtn" class="text-xs text-gray-500 hover:text-blue-600">
                <i class="fas fa-question-circle text-xs"></i> Forgot Password?
            </button>
        </div>
        
        <button type="submit" id="loginBtn" 
                class="login-btn w-full bg-gradient-to-r from-blue-600 to-blue-800 hover:from-blue-700 hover:to-blue-900 text-white py-2.5 rounded-xl font-semibold text-sm flex items-center justify-center gap-2">
            <i class="fas fa-sign-in-alt text-sm"></i> Sign In
        </button>
    </form>
    
    <div class="text-center mt-5 pt-3 border-t border-gray-100">
        <p class="text-xs text-gray-400"><i class="fas fa-shield-alt mr-1"></i> Secure Login</p>
    </div>
</div>

<!-- Forgot Password Modal -->
<div id="forgotModal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl w-full max-w-sm overflow-hidden shadow-2xl modal-enter">
        <div class="bg-gradient-to-r from-blue-600 to-blue-800 px-5 py-3">
            <div class="flex justify-between items-center">
                <h3 class="text-base font-bold text-white"><i class="fas fa-key mr-1"></i> Reset Password</h3>
                <button id="closeModalBtn" class="text-white hover:text-gray-200 text-xl">&times;</button>
            </div>
        </div>
        
        <div class="p-5">
            <p class="text-gray-600 mb-3 text-center text-sm">Enter your email address to reset your password.</p>
            <input type="email" id="resetEmail" 
                   class="w-full p-2.5 border border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none mb-3 text-sm"
                   placeholder="jacksonmyula773@gmail.com"
                   value="jacksonmyula773@gmail.com">
            <button id="sendResetBtn" class="w-full bg-gradient-to-r from-blue-600 to-blue-800 hover:from-blue-700 hover:to-blue-900 text-white py-2.5 rounded-xl font-semibold text-sm">
                <i class="fas fa-paper-plane mr-1"></i> Generate Reset Link
            </button>
            
            <div id="resetLinkContainer" class="hidden mt-3 reset-link-box">
                <p class="text-xs font-semibold text-green-700 mb-1">✅ Reset Link Generated:</p>
                <p id="resetLinkText" class="text-xs text-blue-600 break-all"></p>
                <button id="copyResetLinkBtn" class="mt-2 text-xs bg-blue-600 text-white px-2 py-1 rounded hover:bg-blue-700 transition">
                    <i class="fas fa-copy mr-1"></i> Copy Link
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost/geotraverse/backend/api';
    let currentResetLink = '';
    
    function togglePasswordVisibility() {
        const input = document.getElementById('loginPassword');
        const icon = document.querySelector('.password-toggle');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = `toast-message ${isError ? 'error' : ''}`;
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'} mr-1"></i>${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function shakeElement(element) {
        element.classList.add('shake');
        setTimeout(() => element.classList.remove('shake'), 300);
    }
    
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => showToast('✅ Link copied!'));
    }
    
    function loadSavedCredentials() {
        const savedEmail = localStorage.getItem('admin_remembered_email');
        const savedPassword = localStorage.getItem('admin_remembered_password');
        const rememberChecked = localStorage.getItem('admin_remember_me') === 'true';
        if (savedEmail && rememberChecked) {
            document.getElementById('loginEmail').value = savedEmail;
            if (savedPassword) document.getElementById('loginPassword').value = savedPassword;
            document.getElementById('rememberMe').checked = true;
        }
    }
    
    function saveCredentials(email, password, remember) {
        if (remember) {
            localStorage.setItem('admin_remembered_email', email);
            localStorage.setItem('admin_remembered_password', password);
            localStorage.setItem('admin_remember_me', 'true');
        } else {
            localStorage.removeItem('admin_remembered_email');
            localStorage.removeItem('admin_remembered_password');
            localStorage.setItem('admin_remember_me', 'false');
        }
    }
    
    async function handleLogin(email, password, remember) {
        const btn = document.getElementById('loginBtn');
        const original = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div><span class="ml-2">Signing in...</span>';
        
        try {
            const response = await fetch(`${API_BASE}/admin_login.php`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const result = await response.json();
            
            if (result.success) {
                localStorage.setItem('admin_token', result.data.token);
                localStorage.setItem('admin_user', JSON.stringify(result.data.user));
                saveCredentials(email, password, remember);
                showToast('Login successful! Redirecting...');
                setTimeout(() => window.location.href = 'dashboard.html', 500);
            } else {
                showToast(result.message || 'Invalid email or password', true);
                document.getElementById('loginPassword').value = '';
                btn.disabled = false;
                btn.innerHTML = original;
            }
        } catch (error) {
            showToast('Connection error', true);
            btn.disabled = false;
            btn.innerHTML = original;
        }
    }
    
    async function handleForgotPassword(email) {
        const btn = document.getElementById('sendResetBtn');
        const original = btn.innerHTML;
        const container = document.getElementById('resetLinkContainer');
        const linkText = document.getElementById('resetLinkText');
        
        container.classList.add('hidden');
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div><span class="ml-2">Generating...</span>';
        
        try {
            const response = await fetch(`${API_BASE}/forgot_password.php`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const result = await response.json();
            
            if (result.success && result.reset_link) {
                currentResetLink = result.reset_link;
                linkText.innerHTML = currentResetLink;
                container.classList.remove('hidden');
                showToast('✅ Reset link generated! Copy the link below.', false);
            } else {
                showToast(result.message || 'Email not found', true);
            }
        } catch (error) {
            showToast('Connection error', true);
        } finally {
            btn.disabled = false;
            btn.innerHTML = original;
        }
    }
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const remember = document.getElementById('rememberMe').checked;
        if (!email || !password) {
            showToast('Please enter email and password', true);
            return;
        }
        await handleLogin(email, password, remember);
    });
    
    // Forgot Password Modal
    const modal = document.getElementById('forgotModal');
    const forgotBtn = document.getElementById('forgotPasswordBtn');
    const closeBtn = document.getElementById('closeModalBtn');
    const sendBtn = document.getElementById('sendResetBtn');
    const resetEmail = document.getElementById('resetEmail');
    const copyBtn = document.getElementById('copyResetLinkBtn');
    
    forgotBtn.onclick = () => {
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        resetEmail.value = document.getElementById('loginEmail').value;
        document.getElementById('resetLinkContainer').classList.add('hidden');
    };
    
    closeBtn.onclick = () => {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    };
    
    modal.onclick = (e) => { if (e.target === modal) closeBtn.click(); };
    
    sendBtn.onclick = async () => {
        const email = resetEmail.value.trim();
        if (!email) {
            showToast('Enter email address', true);
            return;
        }
        await handleForgotPassword(email);
    };
    
    copyBtn.onclick = () => { if (currentResetLink) copyToClipboard(currentResetLink); };
    
    resetEmail.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });
    document.getElementById('loginPassword').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('loginForm').dispatchEvent(new Event('submit')); });
    
    // Session check
    if (localStorage.getItem('admin_token') && localStorage.getItem('admin_user')) {
        window.location.href = 'dashboard.html';
    }
    
    loadSavedCredentials();
</script>
</body>
</html>
