<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GeoTraverse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 to-blue-700 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-r from-blue-500 to-cyan-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-globe-americas text-white text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">GeoTraverse</h2>
            <p class="text-gray-500 mt-1">Admin Dashboard Login</p>
        </div>
        
        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="email" id="email" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="admin@geotraverse.com" required>
                </div>
            </div>
            
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="password" id="password" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="••••••••" required>
                </div>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg transition font-medium">Login</button>
        </form>
        
        <div id="errorMsg" class="mt-4 text-center text-red-600 text-sm hidden"></div>
    </div>
    
    <script>
    const API_BASE = 'http://localhost/geotraverse/api/';
    
    $('#loginForm').on('submit', function(e) {
        e.preventDefault();
        
        $.ajax({
            url: API_BASE + 'login.php',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                email: $('#email').val(),
                password: $('#password').val()
            }),
            success: function(response) {
                if(response.success) {
                    localStorage.setItem('auth_token', response.token);
                    localStorage.setItem('admin_name', response.name);
                    localStorage.setItem('admin_email', response.email);
                    window.location.href = 'index.html';
                } else {
                    $('#errorMsg').text(response.message).removeClass('hidden');
                }
            },
            error: function() {
                $('#errorMsg').text('Login failed. Please try again.').removeClass('hidden');
            }
        });
    });
    </script>
</body>
</html>
