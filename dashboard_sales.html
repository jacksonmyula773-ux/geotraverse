<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GeoTraverse | Sales Department Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        /* LIGHT MODE (DEFAULT) - White background */
        body { 
            background: #f0f2f5; 
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        /* DARK MODE STYLES */
        body.dark-mode { 
            background: #0f172a;
        }
        body.dark-mode .bg-white { 
            background-color: #1e293b;
        }
        body.dark-mode .bg-gray-50 { 
            background-color: #0f172a;
        }
        body.dark-mode .text-gray-500, 
        body.dark-mode .text-gray-600 { 
            color: #94a3b8;
        }
        body.dark-mode .text-gray-700, 
        body.dark-mode .text-gray-800, 
        body.dark-mode .text-gray-900 { 
            color: #f1f5f9;
        }
        body.dark-mode .border-gray-200, 
        body.dark-mode .border-gray-100 { 
            border-color: #334155;
        }
        body.dark-mode .stat-card { 
            background-color: #1e293b; 
            border-color: #334155;
        }
        body.dark-mode .lead-card, 
        body.dark-mode .ad-card, 
        body.dark-mode .report-card { 
            background-color: #1e293b; 
            border-color: #334155;
        }
        body.dark-mode .modal-white { 
            background-color: #1e293b;
        }
        body.dark-mode .chat-sent { 
            background-color: #065f46;
        }
        body.dark-mode .chat-received { 
            background-color: #334155;
        }
        body.dark-mode input, 
        body.dark-mode select, 
        body.dark-mode textarea { 
            background-color: #0f172a; 
            border-color: #334155; 
            color: #f1f5f9;
        }
        body.dark-mode .search-results-dropdown { 
            background-color: #1e293b;
        }
        body.dark-mode .search-result-item { 
            border-bottom-color: #334155;
        }
        body.dark-mode .search-result-item:hover { 
            background-color: #334155;
        }
        
        /* BLUE Sidebar */
        .sidebar {
            background: linear-gradient(180deg, #1e40af 0%, #1e3a5f 100%);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 260px;
            z-index: 30;
        }
        
        /* Logo styling */
        .sidebar-logo {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .sidebar-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }
        
        .sidebar-logo-link { cursor: pointer; transition: opacity 0.2s; display: flex; align-items: center; gap: 12px; }
        .sidebar-logo-link:hover { opacity: 0.8; }
        
        .sidebar-nav { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 1rem 0.5rem; scrollbar-width: thin; }
        .sidebar-footer { padding: 0.75rem; border-top: 1px solid rgba(255,255,255,0.2); flex-shrink: 0; }
        
        .nav-item {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            cursor: pointer;
            margin-bottom: 2px;
        }
        .nav-item.active { background-color: rgba(255,255,255,0.12); border-left-color: #60a5fa; }
        .nav-item.active i { color: #60a5fa; }
        .nav-item:hover:not(.active) { background-color: rgba(255,255,255,0.08); }
        
        /* Blue Stat Cards */
        .stat-card { 
            transition: all 0.3s ease; 
            background: white; 
            border-radius: 16px; 
            border: 1px solid #e5e7eb;
            cursor: pointer; 
        }
        .stat-card:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 20px 25px -12px rgba(0,0,0,0.15); 
            border-color: #3b82f6;
        }
        
        .lead-card, .ad-card, .report-card { 
            background: white; 
            border-radius: 12px; 
            padding: 12px; 
            margin-bottom: 8px; 
            border-left: 3px solid #3b82f6; 
            transition: all 0.2s; 
            cursor: pointer;
        }
        .lead-card:hover, .ad-card:hover, .report-card:hover { 
            transform: translateX(5px); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        }
        
        .chat-bubble { max-width: 80%; padding: 10px 14px; border-radius: 12px; margin-bottom: 8px; }
        .chat-sent { background-color: #d1fae5; margin-left: auto; }
        .chat-received { background-color: #e5e7eb; }
        
        .color-option { transition: all 0.2s; cursor: pointer; border: 2px solid transparent; width: 32px; height: 32px; border-radius: 50%; }
        .color-option:hover { transform: scale(1.1); }
        .color-option.selected { border-color: white; box-shadow: 0 0 0 2px #333; }
        
        .toast-notification { 
            position: fixed; bottom: 20px; right: 20px; 
            background: linear-gradient(135deg, #3b82f6, #1e40af); 
            color: white; padding: 10px 16px; border-radius: 8px; 
            z-index: 1000; animation: slideInRight 0.3s ease; 
            font-size: 13px;
        }
        .toast-notification.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* Status badges */
        .status-new { background: #dbeafe; color: #2563eb; }
        .status-contacted { background: #fef3c7; color: #d97706; }
        .status-negotiation { background: #e9d5ff; color: #7e22ce; }
        .status-won { background: #d1fae5; color: #059669; }
        .status-lost { background: #fee2e2; color: #dc2626; }
        
        body.dark-mode .status-new { background: #1e3a5f; color: #60a5fa; }
        body.dark-mode .status-contacted { background: #451a03; color: #fbbf24; }
        body.dark-mode .status-negotiation { background: #3b0764; color: #c084fc; }
        body.dark-mode .status-won { background: #064e3b; color: #34d399; }
        body.dark-mode .status-lost { background: #7f1d1d; color: #f87171; }
        
        .main-content { margin-left: 260px; }
        @media (max-width: 768px) {
            .sidebar { left: -260px; transition: left 0.3s; }
            .sidebar.mobile-open { left: 0; }
            .mobile-menu-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99; display: none; }
            .mobile-menu-overlay.open { display: block; }
            .main-content { margin-left: 0; }
        }
        
        .search-results-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            z-index: 50;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }
        .search-results-dropdown.active { display: block; }
        .search-result-item { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; cursor: pointer; transition: background 0.2s; font-size: 13px; }
        .search-result-item:hover { background-color: #f3f4f6; }
        
        input:focus, select:focus, textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); outline: none; }
        
        .scroll-top {
            position: fixed; bottom: 20px; right: 20px;
            background: #3b82f6; width: 36px; height: 36px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; transition: all 0.3s;
            z-index: 99;
            color: white;
        }
        .scroll-top.visible { opacity: 1; }
        .scroll-top:hover { transform: scale(1.1); }
        
        /* Grid layouts */
        .overview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
        .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 16px; }
        .bottom-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        
        @media (max-width: 1024px) {
            .overview-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
            .bottom-grid { grid-template-columns: 1fr; }
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            color: white;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(59,130,246,0.3);
        }
        
        /* Modal white background */
        .modal-white {
            background: white;
            border-radius: 20px;
        }
        
        /* Report view modal content */
        .report-view-content {
            max-height: 500px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div id="mobileMenuOverlay" class="mobile-menu-overlay" onclick="closeMobileSidebar()"></div>

<div class="flex h-screen overflow-hidden">
    <!-- SIDEBAR -->
    <aside id="mainSidebar" class="sidebar w-64 shadow-xl flex flex-col z-20">
        <div class="px-4 py-5 border-b border-white/20 flex-shrink-0">
            <div class="sidebar-logo-link" onclick="goToMainWebsite()">
                <div class="sidebar-logo">
                    <img src="https://i.postimg.cc/MT6jTVHh/weblogo.png" alt="GeoTraverse Logo" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%233b82f6%22/%3E%3Ctext x=%2250%22 y=%2265%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2240%22 font-weight=%22bold%22%3EG%3C/text%3E%3C/svg%3E';">
                </div>
                <div>
                    <span class="text-lg font-bold text-white tracking-tight">GeoTraverse</span>
                    <p class="text-[9px] text-white/70 tracking-wide">SALES DEPARTMENT</p>
                </div>
            </div>
        </div>
        
        <div class="sidebar-nav flex-1 overflow-y-auto">
            <nav class="space-y-0.5">
                <div class="text-white/50 text-[9px] px-3 py-2 uppercase font-semibold tracking-wider">MAIN MENU</div>
                <a href="#" class="nav-item active flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white text-sm" data-section="overview">
                    <i class="fas fa-tachometer-alt w-4 text-white/70"></i><span>Dashboard</span>
                </a>
                <a href="#" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white text-sm" data-section="leads">
                    <i class="fas fa-users w-4 text-white/70"></i><span>Leads</span>
                </a>
                <a href="#" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white text-sm" data-section="marketing">
                    <i class="fas fa-chart-line w-4 text-white/70"></i><span>Marketing</span>
                </a>
                <a href="#" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white text-sm" data-section="messages">
                    <i class="fas fa-envelope w-4 text-white/70"></i><span>Messages</span>
                    <span class="ml-auto bg-red-500 text-white text-[9px] px-1.5 py-0.5 rounded-full" id="sidebarMsgBadge">0</span>
                </a>
                <a href="#" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white text-sm" data-section="reports">
                    <i class="fas fa-chart-bar w-4 text-white/70"></i><span>Reports</span>
                </a>
                <a href="#" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white text-sm" data-section="settings">
                    <i class="fas fa-cog w-4 text-white/70"></i><span>Settings</span>
                </a>
            </nav>
        </div>
        
        <div class="sidebar-footer flex-shrink-0">
            <div class="flex items-center space-x-3 mb-3">
                <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center">
                    <i class="fas fa-user text-white text-xs"></i>
                </div>
                <div class="flex-1">
                    <p class="text-xs font-semibold text-white">Sales Department</p>
                    <p class="text-[9px] text-white/60">Sales Manager</p>
                </div>
            </div>
            <button id="logoutBtn" class="w-full bg-red-600/80 hover:bg-red-600 text-white py-2 rounded-lg text-xs transition">
                <i class="fas fa-sign-out-alt mr-1"></i>Exit
            </button>
        </div>
    </aside>
    
    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-y-auto main-content">
        <header class="bg-white shadow-sm px-5 py-3 sticky top-0 z-10 border-b border-gray-200">
            <div class="flex items-center justify-between flex-wrap gap-2">
                <div class="flex items-center space-x-3">
                    <button id="mobileMenuBtn" class="md:hidden text-gray-600 hover:text-blue-600 transition">
                        <i class="fas fa-bars text-lg"></i>
                    </button>
                    <h1 class="text-base font-bold text-blue-600">Sales Department Dashboard</h1>
                </div>
                
                <!-- Global Search Bar -->
                <div class="flex-1 max-w-md mx-3 relative">
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-xs"></i>
                        <input type="text" id="globalSearchInput" placeholder="Search leads, marketing, reports..." class="w-full pl-8 pr-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500">
                        <div id="searchResultsDropdown" class="search-results-dropdown"></div>
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <span class="text-sm text-gray-500" id="currentDateTime"></span>
                    <button id="darkModeToggle" class="text-gray-500 hover:text-blue-600 transition w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">
                        <i id="darkModeIcon" class="fas fa-moon text-sm"></i>
                    </button>
                </div>
            </div>
        </header>
        
        <div class="p-4" id="mainContentContainer"></div>
    </main>
</div>

<!-- Report View Modal - NEW -->
<div id="reportViewModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
    <div class="modal-white rounded-2xl max-w-2xl w-full shadow-2xl">
        <div class="px-5 py-3 border-b border-gray-200 flex justify-between items-center">
            <h3 class="text-base font-bold text-gray-800" id="reportViewTitle">Report Details</h3>
            <button onclick="closeReportViewModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <div class="p-5 report-view-content" id="reportViewContent"></div>
        <div class="px-5 pb-5 flex justify-end gap-2">
            <button onclick="closeReportViewModal()" class="px-4 py-2 bg-gray-100 rounded-lg text-sm text-gray-700 hover:bg-gray-200 transition">Close</button>
        </div>
    </div>
</div>

<!-- Marketing Details Modal -->
<div id="marketingDetailsModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
    <div class="modal-white rounded-2xl max-w-md w-full shadow-2xl">
        <div class="px-5 py-3 border-b border-gray-200 flex justify-between items-center">
            <h3 class="text-base font-bold text-gray-800" id="marketingModalTitle">Marketing Activity Details</h3>
            <button onclick="closeMarketingDetailsModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <div class="p-5 space-y-3" id="marketingDetailsContent"></div>
        <div class="px-5 pb-5 flex justify-end gap-2">
            <button onclick="closeMarketingDetailsModal()" class="px-4 py-2 bg-gray-100 rounded-lg text-sm text-gray-700 hover:bg-gray-200 transition">Close</button>
        </div>
    </div>
</div>

<!-- Chat Modal -->
<div id="chatModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
    <div class="modal-white rounded-2xl w-full max-w-2xl shadow-2xl">
        <div class="px-5 py-3 border-b border-gray-200 flex justify-between items-center">
            <h3 class="text-base font-bold text-gray-800" id="chatModalTitle">Chat</h3>
            <button onclick="closeChatModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <div class="h-80 overflow-y-auto p-4 bg-gray-50" id="chatMessagesArea"></div>
        <div class="p-4 border-t border-gray-200">
            <div class="flex gap-2">
                <textarea id="chatInput" rows="2" placeholder="Type your message..." class="flex-1 p-2 border border-gray-200 rounded-xl text-sm resize-none bg-white"></textarea>
                <button onclick="sendChatMessage()" class="px-4 py-2 rounded-xl text-white bg-gradient-to-r from-blue-500 to-blue-700 text-sm font-medium hover:shadow-lg transition">Send</button>
            </div>
        </div>
    </div>
</div>

<!-- Start Chat Modal -->
<div id="startChatModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
    <div class="modal-white rounded-2xl max-w-md w-full shadow-2xl">
        <div class="px-5 py-3 border-b border-gray-200"><h3 class="text-base font-bold text-gray-800">Start New Chat</h3></div>
        <div class="p-5 space-y-3">
            <select id="chatDeptSelect" class="w-full p-2 border border-gray-200 rounded-xl text-sm bg-white">
                <option value="Finance">Finance Department</option>
                <option value="Sales">Sales Department</option>
                <option value="Secretary">Secretary Department</option>
                <option value="Managers">Managers Department</option>
                <option value="Admin">Admin</option>
            </select>
            <textarea id="newChatMsg" rows="3" placeholder="Type your message..." class="w-full p-2 border border-gray-200 rounded-xl text-sm bg-white"></textarea>
            <div class="flex gap-2 pt-2">
                <button onclick="sendNewChat()" class="flex-1 bg-gradient-to-r from-blue-500 to-blue-700 text-white py-2 rounded-xl text-sm font-medium">Send</button>
                <button onclick="closeStartChatModal()" class="flex-1 bg-gray-100 py-2 rounded-xl text-sm text-gray-700">Cancel</button>
            </div>
        </div>
    </div>
</div>

<!-- Add Lead Modal -->
<div id="leadModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
    <div class="modal-white rounded-2xl max-w-md w-full shadow-2xl">
        <div class="px-5 py-3 border-b border-gray-200"><h3 class="text-base font-bold text-gray-800">Add New Lead</h3></div>
        <div class="p-5 space-y-2">
            <input type="text" id="leadName" placeholder="Customer Name" class="w-full p-2 border border-gray-200 rounded-xl text-sm bg-white">
            <input type="text" id="leadPhone" placeholder="Phone Number" class="w-full p-2 border border-gray-200 rounded-xl text-sm bg-white">
            <input type="email" id="leadEmail" placeholder="Email Address" class="w-full p-2 border border-gray-200 rounded-xl text-sm bg-white">
            <select id="leadStatus" class="w-full p-2 border border-gray-200 rounded-xl text-sm bg-white">
                <option value="new">New Lead</option>
                <option value="contacted">Contacted</option>
                <option value="negotiation">Negotiation</option>
                <option value="won">Won</option>
                <option value="lost">Lost</option>
            </select>
            <input type="number" id="leadValue" placeholder="Expected Value (TZS)" class="w-full p-2 border border-gray-200 rounded-xl text-sm bg-white">
            <textarea id="leadNotes" rows="2" placeholder="Additional Notes" class="w-full p-2 border border-gray-200 rounded-xl text-sm bg-white"></textarea>
            <div class="flex gap-2 pt-2">
                <button onclick="saveLead()" class="flex-1 bg-gradient-to-r from-blue-500 to-blue-700 text-white py-2 rounded-xl text-sm font-medium">Save Lead</button>
                <button onclick="closeLeadModal()" class="flex-1 bg-gray-100 py-2 rounded-xl text-sm text-gray-700">Cancel</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Lead Modal -->
<div id="editLeadModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
    <div class="modal-white rounded-2xl max-w-md w-full shadow-2xl">
        <div class="px-5 py-3 border-b border-gray-200"><h3 class="text-base font-bold text-gray-800">Edit Lead</h3></div>
        <div class="p-5 space-y-2">
            <input type="hidden" id="editLeadId">
            <input type="text" id="editLeadName" placeholder="Customer Name" class="w-full p-2 border border-gray-200 rounded-xl text-sm bg-white">
            <input type="text" id="editLeadPhone" placeholder="Phone Number" class="w-full p-2 border border-gray-200 rounded-xl text-sm bg-white">
            <input type="email" id="editLeadEmail" placeholder="Email Address" class="w-full p-2 border border-gray-200 rounded-xl text-sm bg-white">
            <select id="editLeadStatus" class="w-full p-2 border border-gray-200 rounded-xl text-sm bg-white">
                <option value="new">New Lead</option>
                <option value="contacted">Contacted</option>
                <option value="negotiation">Negotiation</option>
                <option value="won">Won</option>
                <option value="lost">Lost</option>
            </select>
            <input type="number" id="editLeadValue" placeholder="Expected Value (TZS)" class="w-full p-2 border border-gray-200 rounded-xl text-sm bg-white">
            <textarea id="editLeadNotes" rows="2" placeholder="Additional Notes" class="w-full p-2 border border-gray-200 rounded-xl text-sm bg-white"></textarea>
            <div class="flex gap-2 pt-2">
                <button onclick="updateLead()" class="flex-1 bg-gradient-to-r from-blue-500 to-blue-700 text-white py-2 rounded-xl text-sm font-medium">Update Lead</button>
                <button onclick="closeEditLeadModal()" class="flex-1 bg-gray-100 py-2 rounded-xl text-sm text-gray-700">Cancel</button>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Report Modal -->
<div id="reportFormModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
    <div class="modal-white rounded-2xl max-w-md w-full shadow-2xl">
        <div class="px-5 py-3 border-b border-gray-200"><h3 class="text-base font-bold text-gray-800" id="reportFormTitle">Create New Report</h3></div>
        <div class="p-5 space-y-2">
            <input type="hidden" id="editReportId">
            <input type="text" id="reportTitle" placeholder="Report Title" class="w-full p-2 border border-gray-200 rounded-xl text-sm bg-white">
            <select id="reportType" class="w-full p-2 border border-gray-200 rounded-xl text-sm bg-white">

<script>
    // Department name
    const deptType = "Sales";
    let currentChart = null;
    let currentStatusChart = null;
    let currentChatDept = null;
    let currentEditLeadId = null;
    let currentEditAdId = null;
    let currentEditReportId = null;
    let searchTimeout = null;
    
    // ==================== HELPER FUNCTIONS ====================
    function showToast(message, isError) {
        var toast = document.createElement("div");
        toast.className = "toast-notification" + (isError ? " error" : "");
        toast.innerHTML = "<i class=\"fas " + (isError ? "fa-exclamation-circle" : "fa-check-circle") + " mr-1\"></i>" + message;
        document.body.appendChild(toast);
        setTimeout(function() { toast.remove(); }, 3000);
    }
    
    function formatCurrency(amount) {
        return "TZS " + parseFloat(amount).toLocaleString();
    }
    
    function escapeHtml(text) {
        if (!text) return "";
        var div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
    }
    
    function getStatusClass(status) {
        switch(status) {
            case "new": return "status-new";
            case "contacted": return "status-contacted";
            case "negotiation": return "status-negotiation";
            case "won": return "status-won";
            case "lost": return "status-lost";
            default: return "status-new";
        }
    }
    
    function getStatusText(status) {
        switch(status) {
            case "new": return "New";
            case "contacted": return "Contacted";
            case "negotiation": return "Negotiation";
            case "won": return "Won";
            case "lost": return "Lost";
            case "planned": return "Planned";
            case "active": return "Active";
            case "completed": return "Completed";
            case "cancelled": return "Cancelled";
            case "draft": return "Draft";
            case "sent": return "Sent";
            default: return status;
        }
    }
    
    function getAdTypeText(type) {
        switch(type) {
            case "social_media": return "Social Media";
            case "tv_radio": return "TV / Radio";
            case "print": return "Print / Billboard";
            case "digital": return "Digital Ads";
            case "event": return "Event / Seminar";
            default: return type;
        }
    }
    
    function goToMainWebsite() { 
        window.location.href = "index.html"; 
    }
    
    function closeMobileSidebar() { 
        document.getElementById("mainSidebar").classList.remove("mobile-open"); 
        document.getElementById("mobileMenuOverlay").classList.remove("open"); 
    }
    
    function updateDateTime() {
        var now = new Date();
        var dateTimeStr = now.toLocaleDateString("en-GB") + " " + now.toLocaleTimeString("en-GB");
        var el = document.getElementById("currentDateTime");
        if (el) el.innerText = dateTimeStr;
    }
    
    function logout() {
        if (confirm("Are you sure you want to exit?")) {
            localStorage.removeItem("dept_logged_in");
            localStorage.removeItem("dept_type");
            window.location.href = "department_login.html";
        }
    }
    
    // ==================== DARK MODE TOGGLE ====================
    function initDarkMode() {
        var savedDarkMode = localStorage.getItem("sales_dark_mode");
        if (savedDarkMode === "true") {
            document.body.classList.add("dark-mode");
            document.getElementById("darkModeIcon").classList.remove("fa-moon");
            document.getElementById("darkModeIcon").classList.add("fa-sun");
        }
        
        var darkToggle = document.getElementById("darkModeToggle");
        if (darkToggle) {
            darkToggle.addEventListener("click", function() {
                document.body.classList.toggle("dark-mode");
                var isDark = document.body.classList.contains("dark-mode");
                localStorage.setItem("sales_dark_mode", isDark);
                
                var icon = document.getElementById("darkModeIcon");
                if (isDark) {
                    icon.classList.remove("fa-moon");
                    icon.classList.add("fa-sun");
                    showToast("Dark mode enabled");
                } else {
                    icon.classList.remove("fa-sun");
                    icon.classList.add("fa-moon");
                    showToast("Light mode enabled");
                }
            });
        }
    }
    
    // Scroll to Top
    function initScrollTop() {
        var scrollBtn = document.createElement("div");
        scrollBtn.className = "scroll-top";
        scrollBtn.innerHTML = '<i class="fas fa-arrow-up text-sm"></i>';
        document.body.appendChild(scrollBtn);
        scrollBtn.onclick = function() { window.scrollTo({ top: 0, behavior: "smooth" }); };
        window.addEventListener("scroll", function() {
            if (window.scrollY > 300) {
                scrollBtn.classList.add("visible");
            } else {
                scrollBtn.classList.remove("visible");
            }
        });
    }
    
    // ==================== GLOBAL SEARCH ====================
    function performGlobalSearch() {
        var searchTerm = document.getElementById("globalSearchInput").value.toLowerCase().trim();
        var dropdown = document.getElementById("searchResultsDropdown");
        
        if (searchTimeout) clearTimeout(searchTimeout);
        if (searchTerm === "") { dropdown.classList.remove("active"); dropdown.innerHTML = ""; return; }
        
        searchTimeout = setTimeout(function() {
            var leads = JSON.parse(localStorage.getItem("geotraverse_leads") || "[]");
            var marketing = JSON.parse(localStorage.getItem("geotraverse_marketing") || "[]");
            var reports = JSON.parse(localStorage.getItem("dept_reports") || "[]");
            var myReports = reports.filter(function(r) { return r.department === deptType; });
            
            var leadResults = leads.filter(function(l) { return l.name.toLowerCase().includes(searchTerm) || (l.email && l.email.toLowerCase().includes(searchTerm)); });
            var marketingResults = marketing.filter(function(m) { return m.title.toLowerCase().includes(searchTerm) || m.description.toLowerCase().includes(searchTerm); });
            var reportResults = myReports.filter(function(r) { return r.title.toLowerCase().includes(searchTerm) || r.content.toLowerCase().includes(searchTerm); });
            
            var html = "";
            if (leadResults.length) {
                html += '<div class="p-1.5 bg-gray-50 text-[10px] font-semibold text-blue-600"><i class="fas fa-users mr-1"></i> Leads (' + leadResults.length + ')</div>';
                for (var i = 0; i < Math.min(leadResults.length, 5); i++) {
                    html += '<div class="search-result-item text-xs" onclick="goToSectionAndSearch(\'leads\', \'' + leadResults[i].name + '\')"><div class="font-medium">' + escapeHtml(leadResults[i].name) + '</div><div class="text-gray-400">' + formatCurrency(leadResults[i].value) + '</div></div>';
                }
            }
            if (marketingResults.length) {
                html += '<div class="p-1.5 bg-gray-50 text-[10px] font-semibold text-blue-600"><i class="fas fa-chart-line mr-1"></i> Marketing (' + marketingResults.length + ')</div>';
                for (var j = 0; j < Math.min(marketingResults.length, 5); j++) {
                    html += '<div class="search-result-item text-xs" onclick="goToSectionAndSearch(\'marketing\', \'' + marketingResults[j].title + '\')"><div class="font-medium">' + escapeHtml(marketingResults[j].title) + '</div><div class="text-gray-400">' + formatCurrency(marketingResults[j].budget) + '</div></div>';
                }
            }
            if (reportResults.length) {
                html += '<div class="p-1.5 bg-gray-50 text-[10px] font-semibold text-blue-600"><i class="fas fa-chart-bar mr-1"></i> Reports (' + reportResults.length + ')</div>';
                for (var k = 0; k < Math.min(reportResults.length, 5); k++) {
                    html += '<div class="search-result-item text-xs" onclick="goToSectionAndSearch(\'reports\', \'' + reportResults[k].title + '\')"><div class="font-medium">' + escapeHtml(reportResults[k].title) + '</div><div class="text-gray-400">' + (reportResults[k].type || "weekly") + '</div></div>';
                }
            }
            if (html === "") {
                html = '<div class="p-3 text-center text-gray-400 text-xs"><i class="fas fa-search mb-1"></i><p>No results found</p></div>';
            }
            dropdown.innerHTML = html;
            dropdown.classList.add("active");
        }, 300);
    }
    
    function goToSectionAndSearch(section, searchValue) {
        var dropdown = document.getElementById("searchResultsDropdown");
        if (dropdown) dropdown.classList.remove("active");
        var searchInput = document.getElementById("globalSearchInput");
        if (searchInput) searchInput.value = searchValue;
        showSection(section);
        showToast("Showing results for \"" + searchValue + "\"");
    }
    
    document.addEventListener("click", function(e) {
        var searchInput = document.getElementById("globalSearchInput");
        var dropdown = document.getElementById("searchResultsDropdown");
        if (searchInput && dropdown && !searchInput.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.classList.remove("active");
        }
    });

    function addLog(action) {
        var logs = JSON.parse(localStorage.getItem("dept_activity_logs") || "[]");
        logs.unshift({ action: action, department: deptType, created_at: new Date().toISOString() });
        if (logs.length > 50) logs.pop();
        localStorage.setItem("dept_activity_logs", JSON.stringify(logs));
    }
    
    // ==================== CLEAR LOGS FUNCTION ====================
    function clearLogsFixed() {
        if (confirm("⚠️ Are you sure you want to clear ALL activity logs for Sales department? This action cannot be undone!")) {
            var logs = JSON.parse(localStorage.getItem("dept_activity_logs") || "[]");
            var newLogs = logs.filter(function(log) { 
                return log.department !== deptType; 
            });
            localStorage.setItem("dept_activity_logs", JSON.stringify(newLogs));
            addLog("Cleared all activity logs");
            if (document.getElementById("settingsSection") && !document.getElementById("settingsSection").classList.contains("hidden")) {
                loadSettings();
            }
            showToast("✅ All activity logs cleared successfully");
        }

    // ==================== NAVIGATION ====================
    function showSection(sectionId) {
        var sections = ["overviewSection", "leadsSection", "marketingSection", "messagesSection", "reportsSection", "settingsSection"];
        for (var i = 0; i < sections.length; i++) {
            var el = document.getElementById(sections[i]);
            if (el) el.classList.add("hidden");
        }
        
        var targetId = "";
        if (sectionId === "overview") targetId = "overviewSection";
        else if (sectionId === "leads") targetId = "leadsSection";
        else if (sectionId === "marketing") targetId = "marketingSection";
        else if (sectionId === "messages") targetId = "messagesSection";
        else if (sectionId === "reports") targetId = "reportsSection";
        else if (sectionId === "settings") targetId = "settingsSection";
        
        var targetEl = document.getElementById(targetId);
        if (targetEl) targetEl.classList.remove("hidden");
        
        var navs = document.querySelectorAll(".nav-item");
        for (var j = 0; j < navs.length; j++) navs[j].classList.remove("active");
        var activeNav = document.querySelector('.nav-item[data-section="' + sectionId + '"]');
        if (activeNav) activeNav.classList.add("active");
        
        if (sectionId === "overview") loadOverview();
        else if (sectionId === "leads") loadLeads();
        else if (sectionId === "marketing") loadMarketing();
        else if (sectionId === "messages") loadMessages();
        else if (sectionId === "reports") loadReports();
        else if (sectionId === "settings") loadSettings();
    }
    
    // ==================== OVERVIEW SECTION ====================
    function loadOverview() {
        var leads = JSON.parse(localStorage.getItem("geotraverse_leads") || "[]");
        var marketing = JSON.parse(localStorage.getItem("geotraverse_marketing") || "[]");
        var targets = JSON.parse(localStorage.getItem("dept_sales_targets") || "[]");
        var reports = JSON.parse(localStorage.getItem("dept_reports") || "[]");
        var myReports = reports.filter(function(r) { return r.department === deptType; });
        
        var totalPipeline = 0;
        var wonValue = 0;
        var activeLeads = 0;
        var totalMarketingBudget = 0;
        var activeAds = 0;
        
        for (var i = 0; i < leads.length; i++) {
            totalPipeline += parseFloat(leads[i].value || 0);
            if (leads[i].status === "won") wonValue += parseFloat(leads[i].value || 0);
            if (leads[i].status !== "won" && leads[i].status !== "lost") activeLeads++;
        }
        
        for (var j = 0; j < marketing.length; j++) {
            totalMarketingBudget += parseFloat(marketing[j].budget || 0);
            if (marketing[j].status === "active") activeAds++;
        }
        
        var currentMonth = new Date().toLocaleString("default", { month: "long" });

        var currentAchieved = 0;
        for (var k = 0; k < targets.length; k++) {
            if (targets[k].month === currentMonth) {
                currentTarget = targets[k].target;
                currentAchieved = targets[k].achieved;
                break;

                </div>
                <div class="stat-card p-3 cursor-pointer" onclick="showSection('leads')">

                        <div class="w-8 h-8 bg-green-50 rounded-lg flex items-center justify-center"><i class="fas fa-trophy text-green-500 text-sm"></i></div>
                    </div>
                </div>
                <div class="stat-card p-3 cursor-pointer" onclick="showSection('marketing')">
                    <div class="flex justify-between items-start">
                        <div><p class="text-gray-400 text-[10px] uppercase">Marketing</p><p class="text-base font-bold text-purple-600">${formatCurrency(totalMarketingBudget)}</p><p class="text-[9px] text-gray-400">Active: ${activeAds}</p></div>
                        <div class="w-8 h-8 bg-purple-50 rounded-lg flex items-center justify-center"><i class="fas fa-ad text-purple-500 text-sm"></i></div>
                    </div>
                </div>
                <div class="stat-card p-3 cursor-pointer" onclick="showSection('reports')">
                    <div class="flex justify-between items-start">
                        <div><p class="text-gray-400 text-[10px] uppercase">Reports</p><p class="text-base font-bold text-blue-600">${myReports.length}</p><p class="text-[9px] text-gray-400">Total saved</p></div>
                        <div class="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center"><i class="fas fa-chart-bar text-blue-500 text-sm"></i></div>
                    </div>
                </div>
            </div>
            
            <div class="charts-grid">
                <div class="bg-white rounded-xl shadow-sm p-3">
                    <h3 class="text-xs font-semibold mb-2"><i class="fas fa-chart-line mr-1 text-blue-500"></i>Sales Performance</h3>
                    <div class="h-[160px]"><canvas id="salesChart"></canvas></div>
                </div>
                <div class="bg-white rounded-xl shadow-sm p-3">
                    <h3 class="text-xs font-semibold mb-2"><i class="fas fa-chart-pie mr-1 text-purple-500"></i>Lead Status</h3>
                    <div class="h-[160px]"><canvas id="statusChart"></canvas></div>
                </div>
            </div>
            
            <div class="bottom-grid">
                <div class="bg-white rounded-xl shadow-sm p-3">
                    <div class="flex justify-between items-center mb-2"><h3 class="text-xs font-semibold"><i class="fas fa-trophy mr-1 text-yellow-500"></i>Top 5 Leads</h3><button onclick="showSection('leads')" class="text-[9px] text-blue-500">View All →</button></div>

        var topHtml = "";
        for (var l = 0; l < sortedLeads.length; l++) {
            topHtml += '<div class="flex justify-between items-center text-[11px] py-1.5 border-b border-gray-100"><span class="font-medium">' + escapeHtml(sortedLeads[l].name) + '</span><span class="text-blue-600 font-semibold">' + formatCurrency(sortedLeads[l].value) + '</span></div>';
        }
        document.getElementById("topLeadsList").innerHTML = topHtml || "<p class='text-gray-400 text-center text-xs py-2'>No leads</p>";
        
        // Recent Marketing
        var recentAds = [...marketing].sort(function(a, b) { return new Date(b.date) - new Date(a.date); }).slice(0, 5);
        var adsHtml = "";
        for (var a = 0; a < recentAds.length; a++) {
            adsHtml += '<div class="text-[11px] py-1.5 border-b border-gray-100"><div class="flex justify-between"><span class="font-medium">' + escapeHtml(recentAds[a].title) + '</span><span class="text-blue-600">' + formatCurrency(recentAds[a].budget) + '</span></div><p class="text-[9px] text-gray-400">' + getAdTypeText(recentAds[a].type) + ' • ' + recentAds[a].date + '</p></div>';
        }
        document.getElementById("recentAdsList").innerHTML = adsHtml || "<p class='text-gray-400 text-center text-xs py-2'>No activities</p>";
        
        // Monthly Sales Chart
        var monthlyData = {};
        for (var m = 0; m < leads.length; m++) {
            if (leads[m].status === "won") {
                var month = new Date(leads[m].created_at).toLocaleString("default", { month: "short" });
                monthlyData[month] = (monthlyData[month] || 0) + parseFloat(leads[m].value || 0);
            }
        }
        var months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun"];
        var chartData = [];
        for (var mm = 0; mm < months.length; mm++) chartData.push((monthlyData[months[mm]] || 0) / 1000000);
        
        var ctx = document.getElementById("salesChart")?.getContext("2d");
        if (ctx) {
            if (currentChart) currentChart.destroy();
            currentChart = new Chart(ctx, {
                type: "line",
                data: { labels: months, datasets: [{ label: "Won Deals (TZS M)", data: chartData, borderColor: "#3b82f6", backgroundColor: "rgba(59,130,246,0.05)", fill: true, tension: 0.3, pointBackgroundColor: "#3b82f6", pointRadius: 3 }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: "top", labels: { font: { size: 9 } } } } }
            });
        }
        
        // Status Chart
        var statusCtx = document.getElementById("statusChart")?.getContext("2d");
        if (statusCtx) {
            var statusCount = { new: 0, contacted: 0, negotiation: 0, won: 0, lost: 0 };
            for (var s = 0; s < leads.length; s++) statusCount[leads[s].status] = (statusCount[leads[s].status] || 0) + 1;
            if (currentStatusChart) currentStatusChart.destroy();
            currentStatusChart = new Chart(statusCtx, {
                type: "doughnut",
                data: { labels: ["New", "Contacted", "Negotiation", "Won", "Lost"], datasets: [{ data: [statusCount.new, statusCount.contacted, statusCount.negotiation, statusCount.won, statusCount.lost], backgroundColor: ["#3b82f6", "#f59e0b", "#8b5cf6", "#10b981", "#ef4444"], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: "bottom", labels: { font: { size: 9 } } } } }
            });
        }
        
        addLog("Viewed dashboard overview");
    }

    // ==================== MESSAGES SECTION ====================
    function loadMessages() {
        var allMessages = JSON.parse(localStorage.getItem("dept_messages") || "[]");
        var myMessages = allMessages.filter(function(m) { return m.to === deptType || m.from === deptType; });
        var unreadCount = myMessages.filter(function(m) { return m.to === deptType && !m.read; }).length;
        document.getElementById("sidebarMsgBadge").innerText = unreadCount;
        
        var conversations = {};
        myMessages.forEach(function(m) {
            var other = m.from === deptType ? m.to : m.from;
            if (!conversations[other]) conversations[other] = [];
            conversations[other].push(m);
        });
        
        var convHtml = '<div class="flex justify-between items-center mb-3"><h2 class="text-lg font-bold text-gray-800"><i class="fas fa-envelope mr-1"></i>Messages</h2><button onclick="openStartChatModal()" class="btn-primary text-white px-3 py-1.5 rounded-lg text-xs font-medium shadow-sm"><i class="fas fa-plus-circle mr-1"></i>New Chat</button></div><div class="bg-white rounded-xl p-3 shadow-sm"><div class="space-y-2">';
        var hasConv = false;
        for (var dept in conversations) {
            hasConv = true;
            var lastMsg = conversations[dept][conversations[dept].length-1];
            var unread = conversations[dept].filter(function(m) { return m.to === deptType && !m.read; }).length;
            convHtml += '<div class="border border-gray-200 rounded-lg p-3 flex justify-between items-center cursor-pointer hover:bg-gray-50 transition" onclick="openChatWith(\'' + dept + '\')"><div><p class="font-semibold text-sm text-gray-800">' + dept + '</p><p class="text-xs text-gray-500 truncate max-w-[200px]">' + escapeHtml(lastMsg.message.substring(0,40)) + '</p></div><div class="text-right"><span class="text-[10px] text-gray-400">' + new Date(lastMsg.created_at).toLocaleTimeString() + '</span>' + (unread > 0 ? '<span class="ml-2 bg-red-500 text-white text-[9px] px-1.5 py-0.5 rounded-full">' + unread + '</span>' : '') + '</div></div>';
        }
        convHtml += (hasConv ? "" : '<p class="text-gray-400 text-center py-6 text-sm">No messages yet. Start a new chat!</p>') + '</div></div>';
        document.getElementById("messagesSection").innerHTML = convHtml;
    }
    
    function openStartChatModal() { 
        document.getElementById("startChatModal").classList.remove("hidden");

    function closeStartChatModal() {

    function sendNewChat() {
        var toDept = document.getElementById("chatDeptSelect").value;
        var message = document.getElementById("newChatMsg").value.trim();
        if(!message) { showToast("Enter message", true); return; }
        var messages = JSON.parse(localStorage.getItem("dept_messages") || "[]");
        messages.push({ id: Date.now(), from: deptType, to: toDept, message: message, read: false, created_at: new Date().toISOString() });
        localStorage.setItem("dept_messages", JSON.stringify(messages));
        addLog("Sent message to " + toDept);
        showToast("Message sent");
        closeStartChatModal();
        loadMessages();
    }
    
    function openChatWith(department) {
        currentChatDept = department;
        var messages = JSON.parse(localStorage.getItem("dept_messages") || "[]");
        for (var i = 0; i < messages.length; i++) {
            if (messages[i].to === deptType && messages[i].from === department && !messages[i].read) messages[i].read = true;
        }
        localStorage.setItem("dept_messages", JSON.stringify(messages));
        
        var chatHtml = "";
        for (var j = 0; j < messages.length; j++) {
            var m = messages[j];
            if ((m.from === deptType && m.to === department) || (m.from === department && m.to === deptType)) {
                chatHtml += '<div class="chat-bubble ' + (m.from === deptType ? "chat-sent" : "chat-received") + '"><p class="text-[9px] text-gray-500 mb-0.5">' + (m.from === deptType ? "You" : department) + ' · ' + new Date(m.created_at).toLocaleTimeString() + '</p><p class="text-xs">' + escapeHtml(m.message) + '</p><button onclick="deleteMessage(' + m.id + ')" class="text-red-500 text-[9px] mt-1"><i class="fas fa-trash"></i> Delete</button></div>';
            }
        }
        document.getElementById("chatModalTitle").innerHTML = "Chat with " + department;
        document.getElementById("chatMessagesArea").innerHTML = chatHtml || '<div class="text-center text-gray-400 py-6 text-sm">No messages yet.</div>';
        document.getElementById("chatModal").classList.remove("hidden");
        document.getElementById("chatModal").classList.add("flex");
        document.getElementById("chatMessagesArea").scrollTop = document.getElementById("chatMessagesArea").scrollHeight;
        loadMessages();
    }
    
    function sendChatMessage() {
        var message = document.getElementById("chatInput").value.trim();
        if(!message || !currentChatDept) return;
        var messages = JSON.parse(localStorage.getItem("dept_messages") || "[]");
        messages.push({ id: Date.now(), from: deptType, to: currentChatDept, message: message, read: false, created_at: new Date().toISOString() });
        localStorage.setItem("dept_messages", JSON.stringify(messages));
        document.getElementById("chatInput").value = "";
        openChatWith(currentChatDept);
    }
    
    function deleteMessage(id) {
        var messages = JSON.parse(localStorage.getItem("dept_messages") || "[]");
        var newMessages = messages.filter(function(m) { return m.id !== id; });
        localStorage.setItem("dept_messages", JSON.stringify(newMessages));
        openChatWith(currentChatDept);
        showToast("Message deleted");
    }
    
    function closeChatModal() { 
        document.getElementById("chatModal").classList.add("hidden"); 
        document.getElementById("chatModal").classList.remove("flex"); 
        loadMessages(); 
    }

        if (report) {

            document.getElementById("reportTitle").value = report.title;

    function saveReport() {
        var title = document.getElementById("reportTitle").value.trim();
        var content = document.getElementById("reportContent").value.trim();
        var type = document.getElementById("reportType").value;
        
        if (!title) { showToast("Please enter report title", true); return; }
        if (!content) { showToast("Please enter report content", true); return; }
        
        var reports = JSON.parse(localStorage.getItem("dept_reports") || "[]");
        
        if (currentEditReportId) {
            for (var i = 0; i < reports.length; i++) {
                if (reports[i].id === currentEditReportId && reports[i].department === deptType) {
                    reports[i].title = title;
                    reports[i].content = content;
                    reports[i].type = type;
                    reports[i].updated_at = new Date().toISOString();
                    break;
                }
            }
            addLog("Updated report: " + title);
            showToast("Report updated successfully");
        } else {
            reports.unshift({
                id: Date.now(),
                department: deptType,
                title: title,
                content: content,
                type: type,
                status: "draft",
                sent_to_admin: false,
                created_at: new Date().toISOString()
            });
            addLog("Created new report: " + title);
            showToast("Report saved successfully");
        }
        
        localStorage.setItem("dept_reports", JSON.stringify(reports));
        closeReportFormModal();
        loadReports();
        loadOverview();
    }
    
    function deleteReport(id) {
        if (confirm("Are you sure you want to delete this report?")) {
            var reports = JSON.parse(localStorage.getItem("dept_reports") || "[]");
            var newReports = reports.filter(function(r) { return !(r.id === id && r.department === deptType); });
            localStorage.setItem("dept_reports", JSON.stringify(newReports));
            addLog("Deleted report");
            showToast("Report deleted");
            loadReports();
            loadOverview();
        }
    }
    
    function sendReportToAdmin(id) {
        var reports = JSON.parse(localStorage.getItem("dept_reports") || "[]");
        for (var i = 0; i < reports.length; i++) {
            if (reports[i].id === id && reports[i].department === deptType) {
                reports[i].status = "sent";
                reports[i].sent_to_admin = true;
                reports[i].sent_at = new Date().toISOString();
                break;
            }
        }
        localStorage.setItem("dept_reports", JSON.stringify(reports));
        addLog("Sent report to Admin");
        showToast("Report sent to Admin successfully");
        loadReports();
    }

    function changeColor(color, element) {
        var opts = document.querySelectorAll(".color-option");
        for (var i = 0; i < opts.length; i++) opts[i].classList.remove("selected");
        if(element) element.classList.add("selected");
        var sidebar = document.getElementById("mainSidebar");
        if(sidebar) sidebar.style.background = "linear-gradient(180deg, " + color + " 0%, " + color + "cc 100%)";
        localStorage.setItem("sales_sidebar_color", color);
        showToast("Sidebar color changed");
    }
    
    function createBackup() {
        var backup = { 
            department: deptType, 
            leads: localStorage.getItem("geotraverse_leads"), 
            marketing: localStorage.getItem("geotraverse_marketing"), 
            messages: localStorage.getItem("dept_messages"), 
            reports: localStorage.getItem("dept_reports"), 
            logs: localStorage.getItem("dept_activity_logs"),
            targets: localStorage.getItem("dept_sales_targets"),
            timestamp: new Date().toISOString() 
        };
        var blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "sales_backup_" + new Date().toISOString().slice(0,19) + ".json";
        a.click();
        URL.revokeObjectURL(url);
        addLog("Created backup");
        showToast("Backup created successfully");
    }
    
    function restoreBackup() {
        var input = document.createElement("input");
        input.type = "file";
        input.accept = "application/json";
        input.onchange = function(e) {
            var file = e.target.files[0];
            if(!file) return;
            var reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    var data = JSON.parse(evt.target.result);
                    if(data.leads) localStorage.setItem("geotraverse_leads", data.leads);
                    if(data.marketing) localStorage.setItem("geotraverse_marketing", data.marketing);
                    if(data.messages) localStorage.setItem("dept_messages", data.messages);
                    if(data.reports) localStorage.setItem("dept_reports", data.reports);
                    if(data.targets) localStorage.setItem("dept_sales_targets", data.targets);
                    addLog("Restored from backup");
                    showToast("Backup restored! Reloading...");
                    setTimeout(function() { location.reload(); }, 1500);
                } catch(err) { showToast("Invalid backup file", true); }
            };
            reader.readAsText(file);
        };
        input.click();
    }

        if (mobileBtn) {
            mobileBtn.addEventListener("click", function() {
                document.getElementById("mainSidebar").classList.add("mobile-open");
                document.getElementById("mobileMenuOverlay").classList.add("open");
            });
        }
        
        var searchInput = document.getElementById("globalSearchInput");
        if (searchInput) searchInput.addEventListener("input", performGlobalSearch);
        
        var savedColor = localStorage.getItem("sales_sidebar_color");
        if(savedColor) {
            var sidebar = document.getElementById("mainSidebar");
            if(sidebar) sidebar.style.background = "linear-gradient(180deg, " + savedColor + " 0%, " + savedColor + "cc 100%)";
        }
        
        setInterval(updateDateTime, 1000);
        updateDateTime();
        addLog("Sales Dashboard initialized");
        
        showToast("Sales Dashboard loaded successfully! Blue theme active.");
    }
    
    // Expose functions to global scope
    window.showSection = showSection;
    window.openLeadModal = openLeadModal; window.closeLeadModal = closeLeadModal; window.saveLead = saveLead;
    window.openEditLeadModal = openEditLeadModal; window.closeEditLeadModal = closeEditLeadModal; window.updateLead = updateLead; window.deleteLead = deleteLead;
    window.exportLeadsToExcel = exportLeadsToExcel; window.exportLeadsToPDF = exportLeadsToPDF;
    window.openAddMarketingModal = openAddMarketingModal; window.editMarketingActivity = editMarketingActivity; window.closeMarketingModal = closeMarketingModal; window.saveMarketingActivity = saveMarketingActivity;
    window.viewMarketingDetails = viewMarketingDetails; window.closeMarketingDetailsModal = closeMarketingDetailsModal;
    window.deleteMarketingActivity = deleteMarketingActivity;
    window.exportMarketingToExcel = exportMarketingToExcel; window.exportMarketingToPDF = exportMarketingToPDF;
    window.openStartChatModal = openStartChatModal; window.closeStartChatModal = closeStartChatModal; window.sendNewChat = sendNewChat;
    window.openChatWith = openChatWith; window.sendChatMessage = sendChatMessage; window.deleteMessage = deleteMessage; window.closeChatModal = closeChatModal;
    window.openReportFormModal = openReportFormModal; window.closeReportFormModal = closeReportFormModal; window.saveReport = saveReport;
    window.editReport = editReport; window.deleteReport = deleteReport; window.sendReportToAdmin = sendReportToAdmin;
    window.viewReportDetails = viewReportDetails; window.closeReportViewModal = closeReportViewModal;
    window.exportSingleReport = exportSingleReport; window.exportAllReportsToExcel = exportAllReportsToExcel; window.exportAllReportsToPDF = exportAllReportsToPDF;
    window.changeColor = changeColor; window.createBackup = createBackup; window.restoreBackup = restoreBackup; window.clearLogsFixed = clearLogsFixed;
    window.logout = logout; window.closeMobileSidebar = closeMobileSidebar;
    
    init();
</script>
